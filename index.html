<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gerador de Confronto – Ice.Bet</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Marca d'água Ice.Bet no fundo -->
  <div class="watermark">
    <img src="logos/icebet-logo.png" alt="Ice.Bet" />
  </div>

  <div class="container">

    <div class="header">
      <a href="https://ice.bet.br/" target="_blank" title="Acessar Ice.Bet">
        <img src="logos/icebet-logo.png" class="header-logo" alt="Ice.Bet" />
      </a>
      <div class="header-text">
        <h1>Gerador de Confronto</h1>
        <p>Selecione a liga e os times para gerar a imagem</p>
      </div>

      <!-- WhatsApp -->
      <a href="https://chat.whatsapp.com/SEULINK" target="_blank" class="whatsapp-btn" title="Grupo no WhatsApp">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
          <path d="M12 0C5.373 0 0 5.373 0 12c0 2.124.554 4.122 1.523 5.859L.057 23.428a.75.75 0 0 0 .921.916l5.701-1.453A11.947 11.947 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.75a9.725 9.725 0 0 1-4.964-1.36l-.355-.211-3.685.939.97-3.594-.231-.368A9.721 9.721 0 0 1 2.25 12C2.25 6.615 6.615 2.25 12 2.25S21.75 6.615 21.75 12 17.385 21.75 12 21.75z"/>
        </svg>
        Comunidade
      </a>

      <!-- Painel de Ferramentas -->
      <div class="tools-wrapper">
        <button class="tools-btn" onclick="toggleTools()" title="Ferramentas">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
          Ferramentas
        </button>
        <div class="tools-panel" id="toolsPanel">
          <div class="tools-panel-title">Ferramentas</div>
          <a href="https://banner.starsoft.games/" target="_blank" class="tool-item">
            <div class="tool-icon">🖼️</div>
            <div class="tool-info">
              <div class="tool-name">Gerador de Banners</div>
              <div class="tool-desc">Crie banners para suas campanhas</div>
            </div>
          </a>
          <!-- Adicione mais ferramentas aqui no futuro -->
        </div>
      </div>

    </div>

    <div class="section-label">Liga</div>
    <div id="leagueButtons" class="league-selector"></div>

    <div class="selectors">

      <div class="team-box">
        <div class="box-label">Time da Casa</div>
        <div class="selected-team" id="selected1">Nenhum selecionado</div>
        <div class="team-grid" id="grid1"></div>
      </div>

      <div class="team-box">
        <div class="box-label">Time Visitante</div>
        <div class="selected-team" id="selected2">Nenhum selecionado</div>
        <div class="team-grid" id="grid2"></div>
      </div>

    </div>

    <button id="generateBtn" disabled onclick="generateImage()">⚽ Gerar Imagem</button>

    <div id="preview">
      <div class="preview-label">Preview</div>
      <canvas id="canvas"></canvas>
      <br/>
      <button id="downloadBtn" onclick="downloadImage()">⬇️ Baixar PNG</button>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
