<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gerador de Confronto – Ice.Bet</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="watermark">
    <img src="logos/icebet-logo.png" alt="Ice.Bet" />
  </div>

  <div class="container">

    <!-- Header -->
    <div class="header">
      <a href="https://ice.bet.br/" target="_blank" title="Acessar Ice.Bet">
        <img src="logos/icebet-logo.png" class="header-logo" alt="Ice.Bet" />
      </a>
      <div class="header-text">
        <h1>Gerador de Confronto</h1>
        <p>Busque os times e gere a imagem</p>
      </div>
      <div class="tools-wrapper">
        <button class="tools-btn" onclick="toggleTools()" title="Ferramentas">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
          Ferramentas
        </button>
        <div class="tools-panel" id="toolsPanel">
          <div class="tools-panel-title">Ferramentas</div>
          <a href="https://banner.starsoft.games/" target="_blank" class="tool-item">
            <div class="tool-icon">🖼️</div>
            <div class="tool-info">
              <div class="tool-name">Gerador de Banners</div>
              <div class="tool-desc">Crie banners para suas campanhas</div>
            </div>
          </a>
        </div>
      </div>
    </div>

    <!-- Painel de Jogos -->
    <div class="fixtures-panel">
      <div class="fixtures-header">
        <span class="fixtures-title">🔴 Jogos Ao Vivo</span>
        <button class="fixtures-refresh" onclick="loadFixtures()" title="Atualizar">↻</button>
      </div>
      <div id="fixturesList" class="fixtures-list">
        <div class="fixtures-loading">Carregando jogos...</div>
      </div>
    </div>

    <!-- Preview ao vivo -->
    <div class="live-preview">
      <div class="live-team">
        <div class="live-logo-wrap">
          <img id="liveLogo1" src="" alt="" style="display:none" />
          <div class="live-logo-placeholder" id="livePlaceholder1">?</div>
        </div>
        <span class="live-name placeholder" id="liveName1">Time da Casa</span>
      </div>
      <div class="live-vs">VS</div>
      <div class="live-team">
        <div class="live-logo-wrap">
          <img id="liveLogo2" src="" alt="" style="display:none" />
          <div class="live-logo-placeholder" id="livePlaceholder2">?</div>
        </div>
        <span class="live-name placeholder" id="liveName2">Time Visitante</span>
      </div>
    </div>

    <!-- Busca dos times -->
    <div class="selectors">

      <div class="team-box">
        <div class="box-label">Time da Casa</div>
        <div class="selected-team" id="selected1">Nenhum selecionado</div>
        <input type="text" id="search1" class="team-search" placeholder="🔍 Buscar time..." oninput="searchTeam(1)" autocomplete="off" />
        <div id="searchStatus1" class="search-status"></div>
        <div class="team-grid" id="grid1"></div>
      </div>

      <div class="team-box">
        <div class="box-label">Time Visitante</div>
        <div class="selected-team" id="selected2">Nenhum selecionado</div>
        <input type="text" id="search2" class="team-search" placeholder="🔍 Buscar time..." oninput="searchTeam(2)" autocomplete="off" />
        <div id="searchStatus2" class="search-status"></div>
        <div class="team-grid" id="grid2"></div>
      </div>

    </div>

    <button id="generateBtn" disabled onclick="generateImage()">⚽ Gerar Imagem</button>

    <div id="preview">
      <div class="preview-label">Preview</div>
      <canvas id="canvas"></canvas>
      <br/>
      <button id="downloadBtn" onclick="downloadImage()">⬇️ Baixar PNG</button>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
